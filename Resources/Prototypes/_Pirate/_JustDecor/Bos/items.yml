- type: entity
  id: WeaponScytheDeath
  suffix: Death
  name: Коса Смерті
  parent: BaseItem
  description: Коса, що випромінює загрозу. Лезо вкрите засохлою кров'ю.
  components:
  - type: Sharp
  - type: Sprite
    sprite: _DV/CosmicCult/Objects/cosmicscythe.rsi
    layers:
      - state: icon
      - state: icon-overlay
        shader: unshaded
  - type: MeleeWeapon
    attackRate: 2
    range: 1.3
    damage:
      types:
       Slash: 15
    wideAnimationRotation: 135
    heavyStaminaCost: 2
    angle: 120
  - type: TeleportStrike
    maxRange: 7
    behindOffset: 0.5
    returnDelay: 0.25
  - type: Tool
    qualities:
      - Prying
  - type: Utensil
    breakChance: 0
  - type: AutoRecharge
    rechargeDuration: 10
  - type: Tag
    tags:
    - Katana
    - BotanyHatchet
  - type: ThrowingAngle
    angle: 315
  - type: Clothing
    sprite: _DV/CosmicCult/Objects/cosmicscythe.rsi
    slots:
    - back
  - type: BoneSaw
    speed: 0.35
  - type: SurgeryTool
    startSound:
      path: /Audio/_Shitmed/Medical/Surgery/saw.ogg
  - type: Item
    size: Ginormous
    sprite: _DV/CosmicCult/Objects/cosmicscythe-inhands.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: IncreaseDamageOnWield
    damage:
      types:
        Structural: 5
  - type: Reflect
    reflectProb: .35
    spread: 120
    soundOnReflect:
      path: /Audio/_DV/CosmicCult/cosmicsword_glance.ogg
      params:
        variation: 0.2
        volume: -6
  - type: Wieldable
    wieldSound:
      path: /Audio/_DV/CosmicCult/cosmic_wield.ogg
      params:
        variation: 0.2
        volume: -2
    unwieldSound:
      path: /Audio/_DV/CosmicCult/cosmic_unwield.ogg
      params:
        variation: 0.2
        volume: 0

- type: entity
  id: ClothingOuterPlagueSuitDeath
  suffix: Death
  parent: [ClothingOuterPlagueSuit]
  components:
  - type: PressureProtection
    highPressureMultiplier: 0.6
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.1
        Slash: 0.1
        Piercing: 0.1
        Heat: 0.1
  - type: Unremoveable
  - type: Storage
    grid:
    - 0,0,2,1
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: StorageFill
    contents:
      - id: AmnestizineHypospray
      - id: BoxAmnestizineCartridge

- type: entity
  id: BoxFolderCentComClipboardDeath
  parent: BoxFolderCentComClipboard
  suffix: Death
  components:
  - type: StorageFill
    contents:
    - id: DeathTicket
      amount: 10
