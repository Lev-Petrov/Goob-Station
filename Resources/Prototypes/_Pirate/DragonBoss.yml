- type: entity
  id: ProjectileDragonsBreathSlowNarinder
  name: драконячий вогонь
  parent: BaseBullet
  noSpawn: true
  components:
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: fireball
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Heat: 25
        Structural: 10
  - type: IgnitionSource
    temperature: 1000
    ignited: true
  - type: IgniteOnCollide
    fireStacks: 4
  - type: PointLight
    enabled: true
    radius: 3
    color: orange

- type: entity
  id: ProjectileDragonsBreathTripleNarinder
  name: спавнер вогняних куль
  parent: ProjectileDragonsBreath
  noSpawn: true
  components:
  - type: ProjectileSpread
    proto: ProjectileDragonsBreath
    count: 4
    spread: 20

- type: entity
  categories: [ HideSpawnMenu ]
  id: DragonsBreathGunTripleNarinder
  name: легені дракона (потрійні)
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 8
    rechargeSound:
      path: /Audio/Animals/space_dragon_roar.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectileDragonsBreathTripleNarinder
    capacity: 1
    count: 1
  - type: Gun
    soundGunshot:
      path: /Audio/Animals/space_dragon_roar.ogg
    soundEmpty: null
    projectileSpeed: 2.5 # Half speed of standard fireballs
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto

- type: entity
  parent: BaseAction
  id: ActionDragonDungeonTripleBreathNarinder
  name: "[color=orange]Потрійний Драконячий Подих[/color]"
  description: Випустіть три вогняні кулі зі зниженою швидкістю!
  components:
  - type: Action
    icon: { sprite : Objects/Weapons/Guns/Projectiles/magic.rsi, state: fireball }
    itemIconStyle: BigAction
    priority: 2
    useDelay: 8
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: WorldTargetAction
    event: !type:ActionGunShootEvent

- type: entity
  parent: BaseAction
  id: ActionDragonDashNarinder
  name: "Драконячий Ривок"
  description: Зробіть потужний ривок вперед!
  components:
  - type: Action
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: blink
    itemIconStyle: NoItem
    sound:
      path: /Audio/Magic/blink.ogg
      params:
        volume: 5
    priority: 3
    useDelay: 5
  - type: TargetAction
    checkCanAccess: false
    range: 8
  - type: WorldTargetAction
    event: !type:DashActionEvent
      distance: 7
      speed: 15
      emote: null

- type: entity
  parent: OrganAnimalLungs
  id: OrganDragonLungsTripleNarinder
  name: легені дракона
  description: Потужний орган дихання, здатний вивергати вогонь.
  components:
  - type: Organ
    onAdd:
    - type: ActionGun
      action: ActionDragonDungeonTripleBreathNarinder
      gunProto: DragonsBreathGunTripleNarinder

- type: body
  id: BodyDragonBossNarinder
  name: "тіло стародавнього дракона"
  root: chest
  slots:
    chest:
      part: ChestDragon
      connections:
      - groin
      organs:
        lungs: OrganDragonLungsTripleNarinder
        heart: OrganAnimalHeart
    groin:
      part: GroinDragon
      connections:
      - legs
      organs:
        liver: OrganAnimalLiver
        stomach: OrganAnimalStomach
        kidneys: OrganAnimalKidneys
    legs:
      part: LegsDragon
      connections:
      - feet
    feet:
      part: FeetAnimal

- type: entity
  parent: BaseMobDragon
  id: MobDragonBossNarinder
  name: "Стародавній Підземельний Дракон"
  description: Величезний левіафан, далекий родич космічних коропів. Кажуть, він охороняє найглибші зали підземель.
  suffix: Narinder
  components:
  - type: GhostRole
    name: "Стародавній Підземельний Дракон"
    description: "Ви - масивний бос дракон, що живе в підземеллях. Захищайте свою територію!"
    rules: "Ви бос. Співпрацюйте зі своїми поплічниками та знищуйте всіх загарбників."
    raffle:
      settings: default
  # Size x2
  - type: Sprite
    scale: 2, 2
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.85 # ~2x standard 0.45
        density: 400
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      750: Critical
      800: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      400: 0.8
      600: 0.6
  - type: MovementSpeedModifier
    baseWalkSpeed: 3.9 # 3 * 1.3
    baseSprintSpeed: 6.5 # 5 * 1.3
    baseWeightlessModifier: 1.95 # 1.5 * 1.3
  - type: Reflect
    reflectProb: 0.1
    reflects:
      - Energy
      - NonEnergy
  - type: MeleeWeapon
    altDisarm: false
    range: 5
    angle: 0
    animation: WeaponArcFist
    wideAnimationRotation: -90
    attackRate: 0.8
    soundHit:
      path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    damage:
      types:
        Piercing: 25
        Slash: 25
        Structural: 20
  - type: MeleeThrowOnHit
    distance: 6.5 # 5-7 range
    speed: 12
  - type: DashAction
    actionProto: ActionDragonDashNarinder
  - type: Body
    prototype: BodyDragonBossNarinder
  - type: Dragon
    maxAccumulator: 9999999
    spawnRiftAction: ActionSpawnRift
    carpProtoId: MobSharkDragon
    carpAmount: 4
    roarRange: 8
    roarStunTime: 4
    roarAction: ActionDragonRoar
    spawnCarpsAction: ActionRiseFish
    carpRiftHealing:
      groups:
        Brute: -4
        Burn: -4
        Airloss: -3
  - type: Butcherable
    spawned:
    - id: FoodMeatDragon
      amount: 4
  - type: Damageable
    damageModifierSet: DragonBossNarinder
  - type: ShowHealthBars
  - type: ActionsContainer


- type: damageModifierSet
  id: DragonBossNarinder
  coefficients:
    Blunt: 0.2
    Slash: 0.2
    Piercing: 0.2
    Heat: 0.2
    Shock: 0.2
  ignoreArmorPierceFlags: All
